<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner - HEZ Group</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- html2canvas & jsPDF for PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --color-primary: #2ac864;
            --color-secondary: #00aeec;
            --color-accent: #ff6699;
        }

        body {
            background: #0a0a0a;
            color: white;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .fluid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: #050505;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.4;
            animation: move 20s infinite alternate ease-in-out;
        }

        .blob:nth-child(2) {
            background: linear-gradient(135deg, var(--color-secondary), var(--color-accent));
            animation-duration: 25s;
            animation-delay: -5s;
            width: 600px;
            height: 600px;
        }

        .blob:nth-child(3) {
            background: linear-gradient(135deg, var(--color-accent), var(--color-primary));
            animation-duration: 30s;
            animation-delay: -10s;
            width: 450px;
            height: 450px;
        }

        @keyframes move {
            0% { transform: translate(-10%, -10%) rotate(0deg); }
            50% { transform: translate(60%, 40%) rotate(180deg); }
            100% { transform: translate(-20%, 80%) rotate(360deg); }
        }

        /* 玻璃拟态效果 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            padding: 10px 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .glass-input:focus {
            border-color: var(--color-secondary);
            background: rgba(255, 255, 255, 0.12);
        }

        .btn-gradient {
            background: linear-gradient(90deg, var(--color-primary), var(--color-secondary));
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .btn-accent {
            background: linear-gradient(90deg, var(--color-secondary), var(--color-accent));
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .checkbox-card {
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .checkbox-card.selected {
            background: rgba(42, 200, 100, 0.2);
            border-color: var(--color-primary);
        }

        /* 打印样式优化 */
        @media print {
            .no-print { display: none !important; }
            .glass-panel { background: white !important; color: black !important; border: 1px solid #ccc !important; }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="fluid-bg">
        <div class="blob"></div>
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <div class="max-w-6xl mx-auto space-y-8">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 glass-panel p-6">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-white flex items-center gap-2">
                    <i data-lucide="calendar-check" class="text-[#2ac864]"></i>
                    Planner
                </h1>
                <p class="text-gray-400 text-sm mt-1">4月23日 - 5月20日 IELTS Preparation Period</p>
            </div>
            <div class="flex gap-3">
                <button onclick="exportXML()" class="flex items-center gap-2 px-4 py-2 rounded-xl border border-white/10 hover:bg-white/10 transition">
                    <i data-lucide="code" size="18"></i> Export XML
                </button>
                <label class="flex items-center gap-2 px-4 py-2 rounded-xl border border-white/10 hover:bg-white/10 cursor-pointer transition">
                    <i data-lucide="upload" size="18"></i> Import XML
                    <input type="file" id="xmlImport" class="hidden" accept=".xml" onchange="importXML(event)">
                </label>
                <button onclick="exportPDF()" class="flex items-center gap-2 px-4 py-2 rounded-xl btn-gradient font-medium">
                    <i data-lucide="file-text" size="18"></i> Export PDF
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Left: Planning -->
            <div class="lg:col-span-5 space-y-6">
                <section class="glass-panel p-6 space-y-4">
                    <h2 class="text-xl font-semibold flex items-center gap-2">
                        <i data-lucide="clock" class="text-[#00aeec]"></i> 1. Select Time Slots
                    </h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="text-xs text-gray-400 uppercase font-bold mb-2 block">Select Date</label>
                            <input type="date" id="dateInput" min="2026-04-23" max="2026-05-20" 
                                   class="glass-input w-full" onchange="updateAvailableSlots()">
                        </div>

                        <div id="slotContainer" class="grid grid-cols-1 gap-2 max-h-48 overflow-y-auto custom-scrollbar pr-2">
                            <p class="text-gray-500 text-sm italic">Please select a date to view available time slots...</p>
                        </div>

                        <div id="timePool" class="pt-4 border-t border-white/10">
                            <label class="text-xs text-gray-400 uppercase font-bold mb-2 block">Selected Time Pool</label>
                            <div id="poolList" class="flex flex-wrap gap-2">
                                <!-- Tag logic -->
                            </div>
                        </div>
                    </div>
                </section>

                <section class="glass-panel p-6 space-y-4">
                    <h2 class="text-xl font-semibold flex items-center gap-2">
                        <i data-lucide="edit-3" class="text-[#ff6699]"></i> 2. Project Details
                    </h2>
                    <div class="space-y-3">
                        <input type="text" id="projName" placeholder="Project Name" class="glass-input w-full">
                        <input type="text" id="projUsers" placeholder="Participants (Use comma for separation.)" class="glass-input w-full">
                        <input type="text" id="projLoc" placeholder="Location" class="glass-input w-full">
                        <textarea id="projDesc" placeholder="Project Description..." class="glass-input w-full h-24 resize-none"></textarea>

                        <button onclick="addProject()" class="w-full py-3 rounded-xl btn-gradient btn-accent font-bold mt-2 shadow-lg shadow-pink-500/20">
                            Add to Project List
                        </button>
                    </div>
                </section>
            </div>

            <!-- Right: Project List -->
            <div class="lg:col-span-7">
                <section id="projectListSection" class="glass-panel p-6 h-full flex flex-col">
                    <h2 class="text-xl font-semibold flex items-center gap-2 mb-6">
                        <i data-lucide="layers" class="text-white"></i> Planning Preview
                    </h2>
                    
                    <div id="projectList" class="space-y-4 flex-1 overflow-y-auto custom-scrollbar pr-2">
                        <div class="text-center py-20 text-gray-500">
                            <i data-lucide="package-open" class="mx-auto mb-4 opacity-20" size="48"></i>
                            <p>No planning projects yet, start adding from the left</p>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide
        lucide.createIcons();

        // Constants and State
        const START_DATE = new Date('2026-04-23');
        const END_DATE = new Date('2026-05-20');
        
        let selectedSlots = []; // { date, time }
        let projects = [];

        // Utility to check day rules
        function getAvailableSlots(dateStr) {
            const date = new Date(dateStr);
            const day = date.getDay(); // 0-Sun, 1-Mon...
            const slots = [];

            // Exclusion Logic
            const isThisFri = (dateStr === '2026-04-24');
            const isThisSat = (dateStr === '2026-04-25');
            const isNextWed = (dateStr === '2026-04-29');

            // Weekly Rules
            switch(day) {
                case 2: // Tue
                    slots.push("19:00 - 22:00");
                    break;
                case 3: // Wed
                    if (!isNextWed) {
                        slots.push("14:00 - 17:30", "19:00 - 22:00");
                    }
                    break;
                case 4: // Thu
                    slots.push("19:00 - 22:00");
                    break;
                case 5: // Fri
                    if (!isThisFri) {
                        slots.push("14:00 - 17:30", "19:00 - 22:00");
                    }
                    break;
                case 6: // Sat
                    if (!isThisSat) {
                        slots.push("09:00 - 12:00", "14:00 - 18:00", "19:00 - 22:00");
                    }
                    break;
                case 0: // Sun
                    slots.push("19:00 - 22:00");
                    break;
            }
            return slots;
        }

        function updateAvailableSlots() {
            const dateStr = document.getElementById('dateInput').value;
            const container = document.getElementById('slotContainer');
            container.innerHTML = '';

            if (!dateStr) return;

            const available = getAvailableSlots(dateStr);
            if (available.length === 0) {
                container.innerHTML = '<p class="text-red-400 text-sm">该日期暂无空余时间段。</p>';
                return;
            }

            available.forEach(slot => {
                const isSelected = selectedSlots.some(s => s.date === dateStr && s.time === slot);
                const div = document.createElement('div');
                div.className = `checkbox-card flex items-center gap-3 p-3 rounded-xl border border-white/10 transition ${isSelected ? 'selected' : ''}`;
                div.innerHTML = `
                    <div class="w-5 h-5 rounded border border-white/30 flex items-center justify-center ${isSelected ? 'bg-[#2ac864]' : ''}">
                        ${isSelected ? '<i data-lucide="check" size="14"></i>' : ''}
                    </div>
                    <span class="text-sm">${slot}</span>
                `;
                div.onclick = () => toggleSlot(dateStr, slot);
                container.appendChild(div);
            });
            lucide.createIcons();
        }

        function toggleSlot(date, time) {
            const index = selectedSlots.findIndex(s => s.date === date && s.time === time);
            if (index > -1) {
                selectedSlots.splice(index, 1);
            } else {
                selectedSlots.push({ date, time });
            }
            renderPool();
            updateAvailableSlots();
        }

        function renderPool() {
            const pool = document.getElementById('poolList');
            pool.innerHTML = '';
            selectedSlots.sort((a, b) => new Date(a.date) - new Date(b.date)).forEach((s, idx) => {
                const tag = document.createElement('div');
                tag.className = 'bg-white/10 px-3 py-1 rounded-full text-xs flex items-center gap-2 border border-white/5';
                tag.innerHTML = `
                    <span class="text-[#00aeec]">${s.date.split('-').slice(1).join('/')}</span>
                    <span>${s.time}</span>
                    <button onclick="removeSlot(${idx})" class="hover:text-red-400"><i data-lucide="x" size="12"></i></button>
                `;
                pool.appendChild(tag);
            });
            lucide.createIcons();
        }

        function removeSlot(index) {
            selectedSlots.splice(index, 1);
            renderPool();
            updateAvailableSlots();
        }

        function addProject() {
            const name = document.getElementById('projName').value;
            const users = document.getElementById('projUsers').value;
            const loc = document.getElementById('projLoc').value;
            const desc = document.getElementById('projDesc').value;

            if (!name || selectedSlots.length === 0) {
                showMsg('Please fill in the project name and select at least one time slot');
                return;
            }

            const newProject = {
                id: Date.now(),
                name,
                users,
                location: loc,
                description: desc,
                timeSlots: [...selectedSlots]
            };

            projects.push(newProject);
            renderProjectList();
            
            // Clear inputs
            document.getElementById('projName').value = '';
            document.getElementById('projUsers').value = '';
            document.getElementById('projLoc').value = '';
            document.getElementById('projDesc').value = '';
            selectedSlots = [];
            renderPool();
            updateAvailableSlots();
        }

        function renderProjectList() {
            const list = document.getElementById('projectList');
            list.innerHTML = '';

            if (projects.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-20 text-gray-500">
                        <i data-lucide="package-open" class="mx-auto mb-4 opacity-20" size="48"></i>
                        <p>No planning projects yet, start adding from the left</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            projects.forEach((proj, idx) => {
                const card = document.createElement('div');
                card.className = 'project-card glass-panel p-5 space-y-3 border-l-4 border-l-[#2ac864] hover:bg-white/10 transition group';
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <h3 class="text-lg font-bold text-white project-title">${proj.name}</h3>
                        <button onclick="deleteProject(${idx})" class="text-gray-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition no-export">
                            <i data-lucide="trash-2" size="18"></i>
                        </button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-2 text-sm text-gray-400 project-meta">
                        <div class="flex items-center gap-2"><i data-lucide="users" size="14"></i> ${proj.users || 'Self'}</div>
                        <div class="flex items-center gap-2"><i data-lucide="map-pin" size="14"></i> ${proj.location || 'TBD'}</div>
                    </div>
                    <div class="bg-black/20 p-3 rounded-lg text-xs space-y-1 project-slots">
                        <p class="text-gray-300 font-medium mb-1">Scheduled Time Slots:</p>
                        ${proj.timeSlots.map(s => `<div class="flex justify-between"><span>${s.date}</span><span class="text-[#00aeec]">${s.time}</span></div>`).join('')}
                    </div>
                    <p class="text-sm text-gray-300 line-clamp-2 italic project-desc">"${proj.description || 'No description'}"</p>
                `;
                list.appendChild(card);
            });
            lucide.createIcons();
        }

        function deleteProject(index) {
            projects.splice(index, 1);
            renderProjectList();
        }

        // Message Box instead of alert
        function showMsg(text) {
            const msg = document.createElement('div');
            msg.className = 'fixed bottom-8 left-1/2 -translate-x-1/2 bg-white text-black px-6 py-3 rounded-full font-bold shadow-2xl z-50 animate-bounce';
            msg.innerText = text;
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }

        // Export Functions
        async function exportPDF() {
            const { jsPDF } = window.jspdf;
            const element = document.getElementById('projectListSection');
            
            showMsg('Preparing PDF export...');

            const canvas = await html2canvas(element, {
                backgroundColor: '#ffffff',
                scale: 2,
                useCORS: true,
                onclone: (clonedDoc) => {
                    // 核心修复：强制在克隆的 DOM 中将所有文字改为黑色
                    const section = clonedDoc.getElementById('projectListSection');
                    section.style.background = 'white';
                    section.style.color = 'black';
                    section.style.backdropFilter = 'none';
                    section.style.webkitBackdropFilter = 'none';
                    section.style.border = '1px solid #eee';

                    // 遍历所有文字承载元素并强制改为黑色
                    const textElements = section.querySelectorAll('h1, h2, h3, p, span, div');
                    textElements.forEach(el => {
                        el.style.color = 'black';
                        // 移除卡片的半透明背景，改为浅灰或白色以便打印
                        if (el.classList.contains('glass-panel')) {
                            el.style.background = '#fcfcfc';
                            el.style.borderColor = '#ddd';
                        }
                        if (el.classList.contains('bg-black/20')) {
                            el.style.background = '#f0f0f0';
                        }
                    });

                    // 隐藏不需要导出的按钮（如删除图标）
                    section.querySelectorAll('.no-export').forEach(el => el.style.display = 'none');
                    
                    // 修改标题颜色
                    const titles = section.querySelectorAll('.project-title');
                    titles.forEach(t => t.style.color = '#1a1a1a');
                }
            });
            
            const imgData = canvas.toDataURL('image/png');
            const pdf = new jsPDF('p', 'mm', 'a4');
            const imgProps = pdf.getImageProperties(imgData);
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
            
            pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
            pdf.save('My Schedule Plan.pdf');
        }

        function exportXML() {
            let xmlContent = '<?xml version="1.0" encoding="UTF-8"?>\n<SchedulePlan>\n';
            projects.forEach(p => {
                xmlContent += `  <Project id="${p.id}">
    <Name>${p.name}</Name>
    <Participants>${p.users}</Participants>
    <Location>${p.location}</Location>
    <Description>${p.description}</Description>
    <TimeSlots>\n`;
                p.timeSlots.forEach(s => {
                    xmlContent += `      <Slot><Date>${s.date}</Date><Time>${s.time}</Time></Slot>\n`;
                });
                xmlContent += `    </TimeSlots>\n  </Project>\n`;
            });
            xmlContent += '</SchedulePlan>';

            const blob = new Blob([xmlContent], { type: 'text/xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'schedule-export.xml';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importXML(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(e.target.result, "text/xml");
                const projectNodes = xmlDoc.getElementsByTagName("Project");
                
                const importedProjects = [];
                for (let p of projectNodes) {
                    const timeSlots = [];
                    const slotNodes = p.getElementsByTagName("Slot");
                    for (let s of slotNodes) {
                        timeSlots.push({
                            date: s.getElementsByTagName("Date")[0].textContent,
                            time: s.getElementsByTagName("Time")[0].textContent
                        });
                    }

                    importedProjects.push({
                        id: p.getAttribute("id"),
                        name: p.getElementsByTagName("Name")[0].textContent,
                        users: p.getElementsByTagName("Participants")[0].textContent,
                        location: p.getElementsByTagName("Location")[0].textContent,
                        description: p.getElementsByTagName("Description")[0].textContent,
                        timeSlots: timeSlots
                    });
                }
                projects = importedProjects;
                renderProjectList();
                showMsg('Successfully imported ' + projects.length + ' projects');
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
